<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4AA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00A88A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0D1A" />
      <stop offset="100%" style="stop-color:#0A0A12" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGrad)"/>
  
  <!-- Shield outline -->
  <path d="M256 72 L400 140 L400 280 Q400 380 256 448 Q112 380 112 280 L112 140 Z" 
        fill="none" 
        stroke="url(#shieldGrad)" 
        stroke-width="16" 
        stroke-linejoin="round"/>
  
  <!-- Lock/cipher keyhole -->
  <circle cx="256" cy="232" r="48" 
          fill="none" 
          stroke="url(#shieldGrad)" 
          stroke-width="14"/>
  <rect x="240" y="268" width="32" height="64" rx="4" 
        fill="url(#shieldGrad)"/>
  
  <!-- Binary data dots - left side -->
  <circle cx="160" cy="200" r="8" fill="#00D4AA" opacity="0.4"/>
  <circle cx="160" cy="232" r="8" fill="#00D4AA" opacity="0.6"/>
  <circle cx="160" cy="264" r="8" fill="#00D4AA" opacity="0.3"/>
  
  <!-- Binary data dots - right side -->
  <circle cx="352" cy="200" r="8" fill="#00D4AA" opacity="0.3"/>
  <circle cx="352" cy="232" r="8" fill="#00D4AA" opacity="0.5"/>
  <circle cx="352" cy="264" r="8" fill="#00D4AA" opacity="0.4"/>
</svg>
